<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inspiration Gallery</title>
  <style>
    :root {
      --bg: #0a0f17;
      --panel: #101826;
      --panel-2: #162133;
      --text: #f3f5f8;
      --muted: #8d9ab0;
      --line: rgba(255, 255, 255, 0.08);
      --accent: #4d8dff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      padding: 32px;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: end;
      padding: 20px 0 24px;
      margin-bottom: 24px;
      background:
        linear-gradient(180deg, rgba(10, 15, 23, 0.98) 0%, rgba(10, 15, 23, 0.94) 75%, rgba(10, 15, 23, 0) 100%);
      backdrop-filter: blur(12px);
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: -0.04em;
    }

    .header p {
      margin: 0;
      max-width: 720px;
      color: var(--muted);
      line-height: 1.55;
    }

    .meta {
      min-width: 180px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .meta strong {
      color: var(--text);
      display: block;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }

    .card {
      margin: 0;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      border-radius: 18px;
      overflow: hidden;
      min-height: 260px;
    }

    .frame {
      aspect-ratio: 0.95;
      background:
        radial-gradient(circle at top left, rgba(77, 141, 255, 0.18), transparent 38%),
        radial-gradient(circle at bottom right, rgba(147, 94, 255, 0.15), transparent 42%),
        var(--panel);
      display: grid;
      place-items: center;
      border-bottom: 1px solid var(--line);
      overflow: hidden;
    }

    .frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: var(--panel-2);
    }

    figcaption {
      padding: 14px 16px 16px;
    }

    .name {
      display: block;
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
      word-break: break-word;
      margin-bottom: 8px;
    }

    .path {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      word-break: break-word;
    }

    .index {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      height: 30px;
      border-radius: 999px;
      background: rgba(77, 141, 255, 0.14);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
  </style>
</head>
