<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entangled Pair</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Monaco', 'Courier New', monospace;
            color: #fff;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: move;
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            line-height: 1.6;
        }

        .info .pair-id {
            color: rgba(100, 200, 255, 0.8);
            font-weight: bold;
        }

        .sync-status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(20, 20, 30, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 11px;
            backdrop-filter: blur(10px);
            color: rgba(100, 255, 150, 0.9);
        }

        .sync-status::before {
            content: '●';
            margin-right: 8px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div>entangled pair</div>
        <div class="pair-id">Partner instance #056(tez)</div>
        <div style="margin-top: 10px;">© Bjørn Staal</div>
    </div>

    <div class="sync-status">
        Synchronized
    </div>

    <script src="pair.js"></script>
</body>
</html>
