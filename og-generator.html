<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://api.fontshare.com/v2/css?f[]=satoshi@700,900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    background: #0A1628;
    overflow: hidden;
    position: relative;
    font-family: 'Satoshi', 'Helvetica Neue', sans-serif;
  }

  /* Top accent line */
  .accent-line {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #4865FF 0%, #7a68d6 50%, #FF5C38 100%);
  }

  /* Subtle grid texture */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.06;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* Subtle radial glow */
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 15% 30%, rgba(72, 101, 255, 0.12), transparent 35%),
      radial-gradient(circle at 85% 70%, rgba(255, 92, 56, 0.06), transparent 30%);
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 100%;
    padding: 80px 100px;
    gap: 32px;
  }

  .wordmark {
    font-family: 'Satoshi', sans-serif;
    font-size: 72px;
    font-weight: 900;
    letter-spacing: 0.14em;
    color: #F3F5F8;
    text-transform: uppercase;
  }

  .subtitle {
    font-family: 'Azeret Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(243, 245, 248, 0.36);
  }

  .tagline {
    font-family: 'Satoshi', sans-serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -0.02em;
    color: rgba(243, 245, 248, 0.72);
    max-width: 580px;
    margin-top: 16px;
  }

  .tagline em {
    font-style: italic;
    color: #FF5C38;
    font-weight: 700;
  }

  .footer-line {
    position: absolute;
    bottom: 56px;
    left: 100px;
    right: 100px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 20px;
    border-top: 1px solid rgba(243, 245, 248, 0.08);
  }

  .footer-url {
    font-family: 'Azeret Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: rgba(243, 245, 248, 0.28);
  }

  .footer-label {
    font-family: 'Azeret Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(72, 101, 255, 0.5);
  }

  /* Particle dots */
  .dots {
    position: absolute;
    top: 0;
    right: 0;
    width: 400px;
    height: 100%;
    z-index: 0;
    opacity: 0.4;
  }

  .dot {
    position: absolute;
    border-radius: 50%;
    background: #4865FF;
  }
</style>
</head>
<body>
  <div class="accent-line"></div>

  <div class="dots">
    <div class="dot" style="width:3px;height:3px;top:12%;left:20%;opacity:0.4"></div>
    <div class="dot" style="width:2px;height:2px;top:28%;left:45%;opacity:0.3"></div>
    <div class="dot" style="width:4px;height:4px;top:18%;left:72%;opacity:0.5"></div>
    <div class="dot" style="width:2px;height:2px;top:42%;left:30%;opacity:0.25"></div>
    <div class="dot" style="width:3px;height:3px;top:55%;left:60%;opacity:0.35"></div>
    <div class="dot" style="width:2px;height:2px;top:65%;left:85%;opacity:0.2"></div>
    <div class="dot" style="width:3px;height:3px;top:78%;left:15%;opacity:0.3"></div>
    <div class="dot" style="width:2px;height:2px;top:85%;left:50%;opacity:0.25"></div>
    <div class="dot" style="width:4px;height:4px;top:35%;left:88%;opacity:0.4"></div>
    <div class="dot" style="width:2px;height:2px;top:48%;left:10%;opacity:0.2"></div>
    <div class="dot" style="width:3px;height:3px;top:72%;left:40%;opacity:0.3"></div>
    <div class="dot" style="width:2px;height:2px;top:22%;left:55%;opacity:0.2"></div>
  </div>

  <div class="content">
    <div>
      <div class="wordmark">DASEIN</div>
      <div class="subtitle">Foresight</div>
    </div>
    <div class="tagline">Decidir <em>antes</em> de reaccionar. Prospectiva estratégica basada en IA.</div>
  </div>

  <div class="footer-line">
    <span class="footer-url">dasein.cl</span>
    <span class="footer-label">Prospectiva estratégica</span>
  </div>
</body>
</html>
